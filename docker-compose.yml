services:
  graive:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./web/.env.local
    environment:
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.graive.rule=Host(`graive.com`)"
      - "traefik.http.routers.graive.entrypoints=websecure"
      - "traefik.http.routers.graive.tls.certresolver=letsencrypt"
      - "traefik.http.services.graive.loadbalancer.server.port=3000"
      # Redirect www → apex
      - "traefik.http.routers.graive-www.rule=Host(`www.graive.com`)"
      - "traefik.http.routers.graive-www.entrypoints=websecure"
      - "traefik.http.routers.graive-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.graive-www.middlewares=redirect-to-apex"
      - "traefik.http.middlewares.redirect-to-apex.redirectregex.regex=^https://www\\.graive\\.com/(.*)"
      - "traefik.http.middlewares.redirect-to-apex.redirectregex.replacement=https://graive.com/$${1}"
      - "traefik.http.middlewares.redirect-to-apex.redirectregex.permanent=true"
